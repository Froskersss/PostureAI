<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostureAI</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #e8e6df;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 20px;
    }
    h1 { font-size: 16px; color: #c8f060; letter-spacing: 0.1em; }
    #status { font-size: 12px; color: #888; }
    #status.ok    { color: #5de0a0; }
    #status.error { color: #ff6b5b; }
    .camera-wrap {
      position: relative;
      width: 640px;
      height: 480px;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
    }
    #webcam, #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }
    .angle-card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 14px 40px;
      text-align: center;
    }
    .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .value { font-size: 36px; font-weight: 500; color: #c8f060; }
    .unit  { font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <h1>POSTUREAI</h1>
  <p id="status">Initialising...</p>
  <div class="camera-wrap">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay" width="640" height="480"></canvas>
  </div>
  <div class="angle-card">
    <div class="label">Shoulder Align</div>
    <div class="value" id="shoulder-val">--<span class="unit">°</span></div>
  </div>
  <script src="cv.js"></script>
</body>
</html>
