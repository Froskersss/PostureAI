<!DOCTYPE html>
<html>
<head>
  <title>Side Posture Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

// -------- Pose --------
const pose = new Pose({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
  }
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// -------- Angle Function --------
function angleFromVertical(p1, p2) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;

  const angleRad = Math.atan2(dx, -dy);
  return angleRad * (180 / Math.PI);
}

// -------- Posture Calculation --------
function calculatePosture(landmarks) {
  // Use ONE side (left side)
  const shoulder = landmarks[11];
  const hip = landmarks[23];
  const ear = landmarks[7];

  const torsoAngle = angleFromVertical(hip, shoulder);
  const neckAngle = angleFromVertical(shoulder, ear);

  return { torsoAngle, neckAngle };
}

// -------- Results --------
pose.onResults((results) => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    const { torsoAngle, neckAngle } = calculatePosture(results.poseLandmarks);

    ctx.fillStyle = "red";
    ctx.font = "18px Arial";

    ctx.fillText("Torso: " + torsoAngle.toFixed(2), 20, 30);
    ctx.fillText("Neck: " + neckAngle.toFixed(2), 20, 60);

    // Simple posture warning
    if (Math.abs(neckAngle) > 15) {
      ctx.fillText("Bad Neck Posture!", 20, 100);
    }
  }
});

// -------- Camera --------
async function startCamera() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  console.log(devices); // find DroidCam here

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  const camera = new Camera(video, {
    onFrame: async () => {
      await pose.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

startCamera();
</script>

</body>
</html>
